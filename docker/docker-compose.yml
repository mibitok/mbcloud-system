# docker/docker-compose.yml
# mbcloud NAS - Immich Photo Sync Stack
# Оптимизировано для: Raspberry Pi 4/CM4 (BCM2711, ARM64)

name: mbcloud-immich

services:
  # ============================================================================
  # 📸 IMMICH SERVER (основное приложение)
  # ============================================================================
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:v1.120.0
    # Для автоматического обновления на конкретную архитектуру:
    # image: ghcr.io/immich-app/immich-server:release-arm64
    
    volumes:
      # Папка для фото (основное хранилище)
      - /DATA/photos:/usr/src/app/upload
      # Синхронизация времени с хостом
      - /etc/localtime:/etc/localtime:ro
      # Опционально: папка для импорта из внешних источников
      - /DATA/import:/usr/src/app/import:ro
    
    environment:
      # Подключение к базе данных
      - DB_HOSTNAME=immich-database
      - DB_USERNAME=immich
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE_NAME=immich
      # Подключение к Redis
      - REDIS_HOSTNAME=immich-redis
      # Дополнительные настройки
      - TZ=${TZ:-Europe/Moscow}
      - IMMICH_LOG_LEVEL=log
    
    ports:
      # Веб-интерфейс и API
      - "2283:2283"
    
    depends_on:
      immich-database:
        condition: service_healthy
      immich-redis:
        condition: service_started
    
    restart: unless-stopped
    
    # Оптимизация ресурсов для Raspberry Pi
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    
    # Healthcheck для контроля состояния
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2283/api/server-info/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ============================================================================
  # 🗄️ IMMICH DATABASE (PostgreSQL + pgvecto.rs для векторного поиска)
  # ============================================================================
  immich-database:
    container_name: immich_database
    # Образ с поддержкой ARM64 и расширением pgvecto.rs
    image: tensorchord/pgvecto-rs:pg14-v0.2.0
    
    volumes:
      # Постоянное хранение базы данных
      - /DATA/immich-postgres:/var/lib/postgresql/data
    
    environment:
      - POSTGRES_USER=immich
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=immich
      - POSTGRES_INITDB_ARGS=--data-checksums
      # Оптимизация для ограниченной памяти
      - POSTGRES_SHARED_BUFFERS=512MB
      - POSTGRES_EFFECTIVE_CACHE_SIZE=1GB
    
    command: >
      postgres -c shared_preload_libraries=vectors.so
               -c 'search_path="$$user", public, vectors'
               -c logging_collector=on
               -c max_wal_size=2GB
               -c shared_buffers=512MB
    
    restart: unless-stopped
    
    # Ограничение ресурсов
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    
    # Healthcheck для готовности БД
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U immich -d immich"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================================================================
  # ⚡ IMMICH REDIS (кеширование и очереди задач)
  # ============================================================================
  immich-redis:
    container_name: immich_redis
    image: redis:6.2-alpine
    
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    
    volumes:
      # Постоянное хранение данных Redis (опционально)
      - /DATA/immich-redis:/data
    
    restart: unless-stopped
    
    # Ограничение ресурсов
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 64M
    
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============================================================================
  # 🔍 IMMICH MACHINE LEARNING (опционально: распознавание лиц, объектов)
  # ============================================================================
  # ⚠️ Отключено по умолчанию: требует много ресурсов на Raspberry Pi
  # Раскомментируйте, если хотите попробовать (может работать медленно)
  #
  # immich-machine-learning:
  #   container_name: immich_machine_learning
  #   image: ghcr.io/immich-app/immich-machine-learning:release-arm64
  #   volumes:
  #     - /DATA/immich-model-cache:/cache
  #   environment:
  #     - DB_HOSTNAME=immich-database
  #     - REDIS_HOSTNAME=immich-redis
  #   restart: unless-stopped
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 1G

# ============================================================================
# 🌐 СЕТЕВАЯ КОНФИГУРАЦИЯ
# ============================================================================
networks:
  default:
    name: mbcloud-immich-net
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ============================================================================
# 💾 ТОМА (объявление для ясности)
# ============================================================================
volumes:
  immich-postgres:
    external: false
    name: immich-postgres-data
  immich-redis:
    external: false
    name: immich-redis-data

# docker/docker-compose.yml
services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:v1.120.0  # ← Укажите конкретную версию!
    # Или для arm64 Raspberry Pi:
    # image: ghcr.io/immich-app/immich-server:latest-arm64
    volumes:
      - /DATA/photos:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    environment:
      - DB_HOSTNAME=immich-database
      - REDIS_HOSTNAME=immich-redis
    ports:
      - "2283:2283"
    depends_on:
      - immich-database
      - immich-redis
    restart: unless-stopped
    # Оптимизация для Raspberry Pi 4/CM4
    deploy:
      resources:
        limits:
          memory: 2G

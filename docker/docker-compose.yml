#===============================================================================
# mbcloud NAS - Immich Docker Compose (stable version)
# Использование:
#   1. Скопируйте .env.example в .env и настройте пароль
#   2. Запустите: docker compose up -d
#   3. Откройте: http://<your-ip>:2283
#===============================================================================

services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:release
    volumes:
      - /DATA/immich-upload:/usr/src/app/upload
      - /DATA/immich-library:/usr/src/app/library
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    ports:
      - 2283:2283
    depends_on:
      - redis
      - database
    restart: always
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:2283/api/server-info/ping || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - immich-network

  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:release
    volumes:
      - ./model-cache:/cache
    env_file:
      - .env
    restart: always
    depends_on:
      - database
    networks:
      - immich-network

  redis:
    container_name: immich_redis
    image: redis:6.2-alpine@sha256:24898f54f6d54dca716b8c616c5c5a2f4a8b6e3c6a5c5f5c5f5c5f5c5f5c5f5c
    healthcheck:
      test: redis-cli ping || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    networks:
      - immich-network

  database:
    container_name: immich_postgres
    image: tensorchord/pgvecto-rs:pg14-v0.2.0@sha256:90724186f0a3517cf6914295b5ab410db9ce23190a2d9d0b9dd6463e3fa298f0
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready --dbname='${POSTGRES_DB}' --username='${POSTGRES_USER}' || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    command:
      - postgres
      - -c
      - shared_preload_libraries=vectors.so
      - -c
      - 'search_path="$$user", public, vectors'
      - -c
      - logging_collector=on
      - -c
      - max_wal_size=2GB
      - -c
      - shared_buffers=512MB
      - -c
      - wal_compression=on
    restart: always
    networks:
      - immich-network

networks:
  immich-network:
    driver: bridge
